{% extends "base.html" %}

{% block head %}
<style>
    .hidden { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-16 px-6">
    <div class="mb-10 text-center">
        <h1 class="text-4xl font-extrabold text-gray-900 dark:text-slate-50 mb-4">The Framer</h1>
        <p class="text-xl text-gray-600 dark:text-slate-300">Outline your problem here. Dainta will help you better structure the problem.</p>
    </div>

    <div class="bg-white dark:bg-slate-950 rounded-3xl p-8 shadow-sm border border-gray-100 dark:border-slate-800 transition-colors">
        <label for="messyInput" class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-2">What's on your mind?</label>
        <textarea id="messyInput" rows="6" class="w-full bg-white dark:bg-slate-900 text-gray-900 dark:text-slate-100 border border-gray-300 dark:border-slate-700 rounded-xl p-4 mb-4 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g., We are losing clients and I think it's because our pricing is too high, but marketing says the product is outdated..."></textarea>
        
        <button id="frameBtn" onclick="submitToFramer()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 transition focus:ring-2 focus:ring-blue-400 focus:outline-none">
            Frame My Problem
        </button>
    </div>

    <div id="hitlSection" class="hidden mt-8 bg-blue-50 dark:bg-slate-900 rounded-3xl p-8 border border-blue-200 dark:border-slate-800 shadow-sm transition-colors">
        <h2 class="text-2xl font-bold text-blue-900 dark:text-blue-400 mb-2">Findings</h2>
        <p class="text-blue-800 dark:text-slate-300 mb-4">Please review the synthesized problem statement below. Is this accurate?</p>
        
        <textarea id="cleanProblem" rows="4" class="w-full bg-white dark:bg-slate-950 text-gray-900 dark:text-slate-100 border border-blue-300 dark:border-slate-700 rounded-xl p-4 mb-6 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
        
        <div class="flex gap-4">
            <button onclick="approveAndProceed()" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 dark:bg-green-500 dark:hover:bg-green-600 transition focus:ring-2 focus:ring-green-400 focus:outline-none">
                Looks Good - Choose Framework
            </button>
            <button onclick="document.getElementById('hitlSection').classList.add('hidden')" class="flex-1 bg-white dark:bg-slate-800 text-gray-700 dark:text-slate-200 border border-gray-300 dark:border-slate-600 font-bold py-3 rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700 transition focus:ring-2 focus:ring-gray-400 focus:outline-none">
                Cancel & Rewrite
            </button>
        </div>
    </div>
</div>

<script>
    async function submitToFramer() {
        const input = document.getElementById('messyInput').value;
        const btn = document.getElementById('frameBtn');

        if (!input) return alert("Please enter a problem first.");

        btn.innerText = "Analyzing...";
        btn.disabled = true;
        const startTime = Date.now();

        try {
            const response = await fetch('/framer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messyInput: input })
            });
            const data = await response.json();
            const responseTimeMs = Date.now() - startTime;

            if(data.success) {
                document.getElementById('cleanProblem').value = data.framedProblem;
                originalFramedProblem = data.framedProblem;
                document.getElementById('hitlSection').classList.remove('hidden');
                document.getElementById('hitlSection').scrollIntoView({ behavior: 'smooth' });

                if (typeof pendo !== 'undefined') {
                    pendo.track("problem_framing_completed", {
                        input_length: input.length,
                        framed_problem_length: data.framedProblem.length,
                        processing_success: true,
                        response_time_ms: responseTimeMs
                    });
                }
            } else {
                if (typeof pendo !== 'undefined') {
                    pendo.track("problem_framing_failed", {
                        input_length: input.length,
                        error_type: "api_error",
                        error_message: "Non-success response"
                    });
                }
                alert("Error framing problem.");
            }
        } catch (error) {
            console.error(error);
            if (typeof pendo !== 'undefined') {
                pendo.track("problem_framing_failed", {
                    input_length: input.length,
                    error_type: "connection_error",
                    error_message: String(error.message).substring(0, 100)
                });
            }
            alert("Connection error.");
        } finally {
            btn.innerText = "Frame My Problem";
            btn.disabled = false;
        }
    }

    let originalFramedProblem = '';

    function approveAndProceed() {
        const cleanProblemText = document.getElementById('cleanProblem').value;

        if (typeof pendo !== 'undefined') {
            pendo.track("problem_statement_approved", {
                approved_problem_length: cleanProblemText.length,
                was_problem_edited: originalFramedProblem !== '' && cleanProblemText !== originalFramedProblem,
                original_framed_length: originalFramedProblem.length
            });
        }

        localStorage.setItem('Dainta_clean_problem', cleanProblemText);
        window.location.href = "/app";
    }
</script>
{% endblock %}
